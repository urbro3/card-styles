<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta
        http-equiv="X-UA-Compatible"
        content="IE=edge"
    >
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>Glassmorphism</title>
    <link
        rel="stylesheet"
        href="styles.css"
    >
</head>

<body>
    <div class="wrapper">
        <div class="card">
            <img
                src="paintwave.jpg"
                alt="product"
            >
            <div class="card-body">
                <div class="card-title">Glassmorphism</div>
                <div class="card-desc">Lorem ipsum dolor sit amet consectetur, adipisicing elit. Nemo, voluptatum?</div>
                <div class="read-more"><a href="#">Read More</a></div>
            </div>
        </div>
    </div>
    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.1/vanilla-tilt.min.js"
        integrity="sha512-xTXLkWCanTzPE4g+vyMXdJ1MYKwuhdJqxNfPDE8sHnwwHBXTZY0VNWBiCRiDtGEtLzmLkK5GCSXshPCP2kt8Ug=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer"
    ></script>
    <script type="text/javascript">
        VanillaTilt.init(document.querySelector(".card"), {
            max: 25,
            speed: 400,
            glare: true
        });

        //It also supports NodeList
        VanillaTilt.init(document.querySelectorAll(".card"));
    </script>
</body>

</html>
